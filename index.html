<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>F1 Reaction Time</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    color:#fff;
    font-family:system-ui;
    user-select:none;
    touch-action:manipulation;
}

#wrap{text-align:center;}

#lights{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:12px;
}

.light{
    width:48px;
    height:48px;
    border-radius:50%;
    background:#111;
}

.on{background:#ff0000; box-shadow:0 0 14px #ff0000;}
.go{background:#00ff66; box-shadow:0 0 14px #00ff66;}

#text{font-size:26px;margin-bottom:6px;}
#board{font-size:13px;opacity:.7;}
</style>
</head>

<body>

<div id="wrap">
    <div id="lights">
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
    </div>

    <div id="text">tap to start</div>
    <div id="board"></div>
</div>

<script>
/* =========================
   🎮 GAME CORE (CLEAN)
========================= */

class F1Game {
    constructor(){
        this.state="idle";
        this.t0=0;

        this.ai=new AI();
        this.ui=new UI();
        this.audio=new Audio();
        this.store=new Store();

        this.bind();
        this.ui.render(this.store.get());
    }

    bind(){
        document.addEventListener("mousedown",()=>this.tap());
        document.addEventListener("touchstart",()=>this.tap());
        document.addEventListener("keydown",e=>{
            if(e.code==="Space"||e.code==="Enter")this.tap();
        });
    }

    async start(){
        await this.audio.init();

        this.state="run";
        this.ui.text("...");

        this.audio.engine(true);

        await this.wait(600+Math.random()*700);

        for(let i=0;i<5;i++){
            this.ui.light(i);
            this.audio.rpm(60+i*70);

            await this.wait(280+Math.random()*120);

            this.ui.text(this.ai.msg());

            if(this.ai.bait()){
                await this.bait();
                i=-1;
            }
        }

        await this.wait(900+Math.random()*1000);

        this.ui.go();
        this.audio.go();

        this.t0=performance.now();
        this.state="go";
        this.ui.text("GO");
    }

    async bait(){
        this.state="bait";
        this.ui.text("⚠ FAKE");

        this.audio.stop();

        await this.wait(450);

        this.audio.engine(true);
        this.ui.reset();

        this.state="run";
    }

    tap(){
        if(this.state==="idle")return this.start();

        if(this.state==="bait"){
            this.ui.text("FALSE START");
            this.audio.stop();
            this.state="idle";
            return;
        }

        if(this.state==="go"){
            let t=Math.round(performance.now()-this.t0);

            this.ui.text(t+" ms");
            this.audio.stop();

            this.ai.learn(t);
            this.store.add(t);
            this.ui.render(this.store.get());

            this.ui.text(this.ai.eval(t));

            this.state="idle";
        }
    }

    wait(ms){return new Promise(r=>setTimeout(r,ms));}
}

/* =========================
   🧠 AI (SIMPLIFIED BUT REAL)
========================= */

class AI{
    constructor(){
        this.h=[];
        this.skill=0.5;
        this.avg=250;
    }

    learn(t){
        this.h.push(t);
        if(this.h.length>10)this.h.shift();

        this.avg=this.h.reduce((a,b)=>a+b,0)/this.h.length;

        this.skill += this.avg<220?0.02:-0.015;
        this.skill=Math.max(0.2,Math.min(0.95,this.skill));
    }

    bait(){
        return Math.random()<this.skill*0.3;
    }

    msg(){
        return ["Focus","Pressure","Too slow","Stay sharp"][Math.random()*4|0];
    }

    eval(t){
        let d=Math.abs(t-120);
        return d<=5?"🏎️ Elite":t<120?"🔥 Faster":"🏁 "+d+"ms off";
    }
}

/* =========================
   🔊 AUDIO (MINIMAL CLEAN)
========================= */

class Audio{
    async init(){
        this.ctx=this.ctx||new (window.AudioContext||window.webkitAudioContext)();
        if(this.ctx.state==="suspended")await this.ctx.resume();
    }

    engine(on){
        if(on){
            this.o=this.ctx.createOscillator();
            this.g=this.ctx.createGain();

            this.o.type="sine";
            this.o.frequency.value=60;
            this.g.gain.value=0.03;

            this.o.connect(this.g);
            this.g.connect(this.ctx.destination);

            this.o.start();
        }
    }

    rpm(v){
        if(this.o)this.o.frequency.setTargetAtTime(v,this.ctx.currentTime,0.08);
    }

    go(){
        let o=this.ctx.createOscillator();
        let g=this.ctx.createGain();

        o.type="sine";
        o.frequency.value=240;

        g.gain.setValueAtTime(0.06,this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001,this.ctx.currentTime+0.2);

        o.connect(g);
        g.connect(this.ctx.destination);

        o.start();
        setTimeout(()=>o.stop(),200);
    }

    stop(){
        if(this.o){
            try{this.o.stop();this.o.disconnect();}catch(e){}
            this.o=null;
        }
    }
}

/* =========================
   🏆 STORAGE
========================= */

class Store{
    add(t){
        let d=JSON.parse(localStorage.getItem("f1")||"[]");
        d.push({t});
        d.sort((a,b)=>a.t-b.t);
        localStorage.setItem("f1",JSON.stringify(d.slice(0,5)));
    }

    get(){
        return JSON.parse(localStorage.getItem("f1")||"[]");
    }
}

/* =========================
   🎨 UI (CLEAN)
========================= */

class UI{
    constructor(){
        this.l=[...document.querySelectorAll(".light")];
        this.t=document.getElementById("text");
        this.b=document.getElementById("board");
    }

    text(v){this.t.textContent=v;}

    light(i){if(this.l[i])this.l[i].classList.add("on");}

    reset(){this.l.forEach(x=>x.classList.remove("on","go"));}

    go(){this.l.forEach(x=>x.classList.add("go"));}

    render(d){
        this.b.innerHTML="🏆<br>"+d.map((x,i)=>`${i+1}. ${x.t}ms`).join("<br>");
    }
}

/* ========================= */

const game=new F1Game();
</script>

</body>
</html>
